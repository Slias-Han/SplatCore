name: VRAM Poison Test (M1 Gate)

on:
  push:
    branches: [ main, 'v0.*' ]
  pull_request:
    branches: [ main ]

# 失败则 block merge（通过 required status check 配置）
# 此 workflow 本身无需额外配置，PR 保护规则在 GitHub 仓库设置中开启

jobs:
  vram-poison-test:
    name: VRAM Poison Test — llvmpipe
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # Fixed: replaced LunarG external repo with apt-native mesa install用中文回复我
    - name: Install Vulkan SDK + Mesa llvmpipe
      run: |
        sudo apt-get update -y
        sudo apt-get install -y --no-install-recommends \
          libvulkan1 \
          libvulkan-dev \
          mesa-vulkan-drivers \
          vulkan-tools \
          glslang-tools \
          libglfw3-dev \
          libglm-dev \
          cmake ninja-build \
          glslc
        if vulkaninfo --summary | grep -qi "llvmpipe"; then
          echo "llvmpipe detected during install verification."
        else
          echo "WARNING: llvmpipe not detected in vulkaninfo --summary during install verification."
        fi

    - name: Force llvmpipe (no GPU required)
      run: |
        ICD_PATH="/usr/share/vulkan/icd.d/lvp_icd.x86_64.json"
        if [ ! -f "$ICD_PATH" ]; then
          ICD_PATH="$(find /usr/share/vulkan/icd.d -name '*.json' | head -1)"
        fi
        echo "VK_ICD_FILENAMES=$ICD_PATH" >> $GITHUB_ENV
        echo "LIBGL_ALWAYS_SOFTWARE=1" >> $GITHUB_ENV

    - name: Verify Vulkan environment
      run: |
        vulkaninfo --summary || true

    - name: Configure CMake
      run: |
        cmake -B build -S . \
          -DCMAKE_BUILD_TYPE=Release \
          -G Ninja

    - name: Build Shaders
      run: cmake --build build --target SplatCore_Shaders

    - name: Build Poison Test
      run: cmake --build build --target SplatCore_PoisonTests

    - name: Run VRAM Poison Test
      run: |
        cd build
        ./SplatCore_PoisonTests \
          ../tests/assets/poison_test_scene.ply \
          shaders
      timeout-minutes: 10

    - name: Upload Diff Reports on Failure
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: poison-diff-reports
        path: build/diff_*.txt
        retention-days: 7

    - name: Build SHA256 Test
      run: cmake --build build --target SplatCore_SHA256Tests

    - name: Run SHA256 Consistency Test
      run: |
        cd build
        ./SplatCore_SHA256Tests \
          ../tests/assets/poison_test_scene.ply \
          shaders
      timeout-minutes: 10

    - name: Upload SHA256 Reports
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: sha256-reports
        path: |
          build/sha256_log.txt
          build/sha256_rootcause.md
        retention-days: 14
